<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XII BISNIS DIGITAL</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: black;
    color: white;
    font-family: Arial, sans-serif;
}

/* HERO */
.hero {
    height: 100vh;
    background: url("kelas.jpg") center/cover no-repeat;
    position: relative;
}

/* OVERLAY BIAR TEXT KELIATAN */
.overlay {
    position: absolute;
    width: 100%;
    height: 100%;
    background: linear-gradient(to top, black, rgba(0,0,0,0.4));
}

/* TEXT */
.hero-content {
    position: absolute;
    bottom: 80px;
    left: 60px;
}

.hero-content h1 {
    font-size: 60px;
}

.hero-content p {
    margin-top: 10px;
}

button {
    margin-top: 15px;
    padding: 10px 15px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

.play {
    background: white;
    color: black;
}

.info {
    background: rgba(255,255,255,0.3);
    color: white;
}
</style>
</head>

<body>

<section class="hero">
    <div class="overlay"></div>

    <div class="hero-content">
        <h1>KAMI PAMIT</h1>
        <p>XII BISNIS DIGITAL 2026</p>

        <button class="play">▶ PLAY</button>
        <button class="info">ℹ INFO</button>
    </div>
</section>

<script>
// scroll ke bawah (nanti kalau ada galeri)
document.querySelector(".play").onclick = () => {
    window.scrollBy({ top: window.innerHeight, behavior: "smooth" });
};

// info
document.querySelector(".info").onclick = () => {
    alert("Website kenangan kelas XII BISNIS DIGITAL 🎓");
};
</script>

</body>
</html>
