<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moment Kelas</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: black;
    font-family: Arial, sans-serif;
    color: white;
}

/* CONTAINER FULL */
.hero {
    height: 100vh;
    background: url("kelas.jpg") center/cover no-repeat;
    position: relative;
}

/* OVERLAY */
.overlay {
    position: absolute;
    width: 100%;
    height: 100%;
    background: linear-gradient(to top, rgba(0,0,0,0.6), transparent);
}

/* TEXT BESAR */
.big-text {
    position: absolute;
    left: 30px;
    top: 50%;
    transform: translateY(-50%);
}

.big-text h1 {
    font-size: 80px;
    font-weight: bold;
}

.big-text span {
    font-size: 50px;
    opacity: 0.7;
}

/* CAPTURE TEXT */
.capture {
    position: absolute;
    left: 120px;
    top: 30%;
    transform: rotate(-90deg);
    font-size: 20px;
}

/* MENU KANAN */
.menu {
    position: absolute;
    right: 20px;
    top: 30%;
    display: flex;
    flex-direction: column;
    gap: 15px;
    border: 1px solid white;
    padding: 10px;
    border-radius: 20px;
}

.menu a {
    text-decoration: none;
    color: white;
    font-size: 14px;
    opacity: 0.7;
}

.menu a:hover {
    opacity: 1;
}

/* TEXT BAWAH */
.bottom-text {
    position: absolute;
    left: 20px;
    bottom: 20px;
    max-width: 300px;
    font-size: 14px;
}

/* BUTTON */
.btn {
    position: absolute;
    left: 20px;
    bottom: 100px;
    border: 1px solid white;
    padding: 5px 10px;
    border-radius: 10px;
}
</style>

</head>

<body>

<section class="hero">
    <div class="overlay"></div>

    <!-- TEXT BESAR -->
    <div class="big-text">
        <h1>Moment</h1>
        <span>+</span>
    </div>

    <!-- CAPTURE -->
    <div class="capture">Capture the</div>

    <!-- MENU -->
    <div class="menu">
        <a href="#">moment</a>
        <a href="#">pic</a>
        <a href="#">about</a>
        <a href="#">kelas</a>
    </div>

    <!-- TEXT BAWAH -->
    <div class="bottom-text">
        Sampai kita sadar bahwa lengkap itu bukan soal jumlah, tapi ikatan yang tetap kuat.
    </div>

    <!-- BUTTON -->
    <div class="btn">Until when?</div>

</section>

</body>
</html>
