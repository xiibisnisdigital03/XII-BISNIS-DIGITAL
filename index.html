<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XII BISNIS DIGITAL</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: black;
    color: white;
    font-family: Arial, sans-serif;
    overflow-x: hidden;
}

/* HERO FULL SCREEN */
.hero {
    height: 100vh;
    background: url("kelas.jpg") center/cover no-repeat;
    position: relative;
}

/* OVERLAY */
.overlay {
    position: absolute;
    width: 100%;
    height: 100%;
    background: linear-gradient(to top, rgba(0,0,0,0.8), rgba(0,0,0,0.2));
}

/* TEXT */
.hero-content {
    position: absolute;
    bottom: 80px;
    left: 60px;
    max-width: 500px;
}

.hero-content h1 {
    font-size: 60px;
    font-weight: bold;
}

.hero-content p {
    margin-top: 10px;
    font-size: 16px;
}

/* BUTTON */
button {
    margin-top: 15px;
    padding: 10px 15px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

.play {
    background: white;
    color: black;
}

.info {
    background: rgba(255,255,255,0.3);
    color: white;
}

/* SECTION */
.category {
    margin-top: 20px;
}

.category h3 {
    margin-left: 15px;
    margin-bottom: 8px;
}

/* NETFLIX ROW */
.row {
    display: flex;
    overflow-x: auto;
    gap: 6px;
    padding-left: 15px;
}

.row img {
    width: 240px;
    height: 135px;
    object-fit: cover;
    border-radius: 4px;
    transition: 0.3s;
}

.row img:hover {
    transform: scale(1.15);
}

/* HIDE SCROLL */
.row::-webkit-scrollbar {
    display: none;
}
</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
    <div class="overlay"></div>

    <div class="hero-content">
        <h1>KAMI PAMIT</h1>
        <p>XII BISNIS DIGITAL 2026 🎓</p>

        <button class="play">▶ PLAY</button>
        <button class="info">ℹ INFO</button>
    </div>
</section>

<!-- GALERI -->
<section id="gallery">

<div class="category">
    <h3>📸 Kegiatan Kelas</h3>
    <div class="row">
        <img src="kelas.jpg">
        <img src="kelas.jpg">
        <img src="kelas.jpg">
        <img src="kelas.jpg">
    </div>
</div>

<div class="category">
    <h3>🎉 Momen Seru</h3>
    <div class="row">
        <img src="kelas.jpg">
        <img src="kelas.jpg">
        <img src="kelas.jpg">
        <img src="kelas.jpg">
    </div>
</div>

</section>

<script>
// PLAY → scroll ke galeri
document.querySelector(".play").onclick = () => {
    document.getElementById("gallery").scrollIntoView({
        behavior: "smooth"
    });
};

// INFO
document.querySelector(".info").onclick = () => {
    alert("Website kenangan kelas XII BISNIS DIGITAL 🎓");
};

// FADE MASUK
window.onload = () => {
    document.body.style.opacity = 0;
    setTimeout(() => {
        document.body.style.transition = "1s";
        document.body.style.opacity = 1;
    }, 100);
};
</script>

</body>
</html>
