<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XII BISNIS DIGITAL</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:black;color:white;font-family:Arial, sans-serif}

/* ===== HERO ===== */
.hero{
    height:100vh;
    background:url("kelas.jpg") center/cover no-repeat;
    position:relative;
}
.overlay{
    position:absolute;
    width:100%;height:100%;
    background:linear-gradient(to top, rgba(0,0,0,0.3), rgba(0,0,0,0.05));
}
.hero-content{
    position:absolute;
    bottom:80px;
    left:60px;
}
.hero-content h1{font-size:60px}
.hero-content p{margin-top:10px}

button{
    margin-top:15px;
    padding:10px 15px;
    border:none;
    border-radius:5px;
    cursor:pointer;
}
.play{background:white;color:black}
.info{background:rgba(255,255,255,0.3);color:white}

/* ===== GALERI ===== */
.category{margin:30px 0}
.category h3{margin-left:15px;margin-bottom:10px}
.row{
    display:flex;
    overflow-x:auto;
    gap:6px;
    padding-left:15px;
}
.row img{
    width:240px;height:135px;
    object-fit:cover;
    border-radius:6px;
    transition:.3s;
}
.row img:hover{transform:scale(1.1)}
.row::-webkit-scrollbar{display:none}

/* ===== CONTACT ===== */
.contact{
    padding:80px 20px;
    background:radial-gradient(circle at top, #2a0050, black);
    text-align:center;
}
.contact h2{font-size:40px}
.contact span{color:violet}
.contact p{opacity:.7;margin:10px 0 40px}

.contact-box{
    display:flex;
    gap:20px;
    max-width:1000px;
    margin:auto;
    background:rgba(255,255,255,0.05);
    border-radius:20px;
    padding:20px;
}

.left{flex:1;text-align:left}
.status{color:violet;margin-bottom:15px}
.card{
    background:rgba(255,255,255,0.05);
    padding:15px;
    border-radius:10px;
    margin-bottom:10px;
}

.right{flex:1;text-align:left}
.right input,.right textarea{
    width:100%;
    margin-bottom:10px;
    padding:10px;
    border-radius:10px;
    border:none;
    background:rgba(255,255,255,0.05);
    color:white;
}
.right textarea{height:100px}
.right button{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:none;
    background:linear-gradient(45deg,violet,purple);
    color:white;
}

/* ===== RESPONSIVE ===== */
@media(max-width:800px){
    .contact-box{flex-direction:column}
    .hero-content{left:20px}
}
</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
    <div class="overlay"></div>

    <div class="hero-content">
        <h1>KAMI PAMIT</h1>
        <p>XII BISNIS DIGITAL 2026 🎓</p>

        <button class="play" onclick="scrollDown()">▶ PLAY</button>
        <button class="info" onclick="showInfo()">ℹ INFO</button>
    </div>
</section>

<!-- GALERI -->
<section id="gallery">

<div class="category">
    <h3>📸 Kegiatan Kelas</h3>
    <div class="row">
        <img src="kelas.jpg">
        <img src="kelas.jpg">
        <img src="kelas.jpg">
        <img src="kelas.jpg">
    </div>
</div>

<div class="category">
    <h3>🎉 Momen Seru</h3>
    <div class="row">
        <img src="kelas.jpg">
        <img src="kelas.jpg">
        <img src="kelas.jpg">
        <img src="kelas.jpg">
    </div>
</div>

</section>

<!-- CONTACT -->
<section class="contact">

<h2>Mari <span>Terhubung</span></h2>
<p>Kirim pesan kenangan ke teman kelas 🎓</p>

<div class="contact-box">

<div class="left">
    <p class="status">● SYSTEM ONLINE</p>

    <div class="card">
        <small>EMAIL</small>
        <h3>kelas@email.com</h3>
    </div>

    <div class="card">
        <small>WHATSAPP</small>
        <h3>+62 812 xxxx xxxx</h3>
    </div>
</div>

<div class="right">
    <h3>KIRIM PESAN</h3>
    <input type="text" placeholder="Nama">
    <input type="email" placeholder="Email">
    <textarea placeholder="Pesan..."></textarea>
    <button onclick="kirim()">KIRIM</button>
</div>

</div>
</section>

<script>
function scrollDown(){
    document.getElementById("gallery").scrollIntoView({behavior:"smooth"});
}

function showInfo(){
    alert("Website kenangan kelas XII BISNIS DIGITAL 🎓");
}

function kirim(){
    alert("Pesan terkirim (simulasi)");
}
</script>

</body>
</html>
