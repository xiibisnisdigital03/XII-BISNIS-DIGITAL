<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">

<body>

<!-- HERO -->

        <button class="play">▶ PLAY</button>

</section>

<!-- GALERI -->
<section id="gallery">

<div class="category">
    <h3>📸 Kegiatan Kelas</h3>
    <div class="row">
        <img src="kelas.jpg">
        <img src="kelas.jpg">

<div class="category">

    </div>

    <div class="card">

        <h3>+62 812 xxxx xxxx</h3>
    </div>

<div class="right">
    <h3>KIRIM PESAN</h3>
    <input type="text" placeholder="Nama">
    <input type="email" placeholder="Email">
    <textarea placeholder="Pesan..."></textarea>

<script src="script.js"></script>
